<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Pullely Consulting</title>
  <meta name="description" content="Get in touch with Pullely Consulting. Tell us about your cross-border business goals and we will get back to you within 24 hours.">
  <meta property="og:title" content="Contact | Pullely Consulting">
  <meta property="og:description" content="Get in touch with our Swiss-Indian advisory team in Zurich.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pullely-consulting.com/contact.html">
  <meta property="og:locale" content="en_US">
  <meta property="og:image" content="https://pullely-consulting.com/images/og-image.jpg">

  <link rel="alternate" hreflang="en" href="https://pullely-consulting.com/contact.html">
  <link rel="alternate" hreflang="de" href="https://pullely-consulting.com/de/contact.html">
  <link rel="alternate" hreflang="fr" href="https://pullely-consulting.com/fr/contact.html">
  <link rel="alternate" hreflang="x-default" href="https://pullely-consulting.com/contact.html">
  <link rel="canonical" href="https://pullely-consulting.com/contact.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="nav" class="nav"></header>

  <!-- Page Header -->
  <section class="section section--dark text-center" style="padding:80px 0 60px;">
    <div class="container">
      <div class="section__label" style="color:var(--gold);">Get In Touch</div>
      <h1>Contact Us</h1>
      <p style="max-width:550px;margin:16px auto 0;font-size:1.1rem;">Tell us about your business goals. We respond within 24 hours.</p>
    </div>
  </section>

  <!-- Contact Form + Info -->
  <section class="section">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 340px;gap:64px;max-width:1000px;margin:0 auto;">

        <!-- Form -->
        <form class="form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <!-- Honeypot -->
          <input type="text" name="_gotcha" style="display:none">

          <div class="form__grid">
            <div class="form__group">
              <label class="form__label">Full Name <span class="required">*</span></label>
              <input type="text" name="name" class="form__input" required placeholder="Your name">
            </div>
            <div class="form__group">
              <label class="form__label">Company <span class="required">*</span></label>
              <input type="text" name="company" class="form__input" required placeholder="Company name">
            </div>
          </div>

          <div class="form__grid">
            <div class="form__group">
              <label class="form__label">Email <span class="required">*</span></label>
              <input type="email" name="email" class="form__input" required placeholder="your@email.com">
            </div>
            <div class="form__group">
              <label class="form__label">Phone</label>
              <input type="tel" name="phone" class="form__input" placeholder="+41 ...">
            </div>
          </div>

          <div class="form__grid">
            <div class="form__group">
              <label class="form__label">Country <span class="required">*</span></label>
              <select name="country" class="form__select" required>
                <option value="">Select country</option>
                <option value="Switzerland">Switzerland</option>
                <option value="India">India</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form__group">
              <label class="form__label">Industry</label>
              <select name="industry" class="form__select">
                <option value="">Select industry</option>
                <option value="Technology">Technology</option>
                <option value="Pharma">Pharma &amp; Healthcare</option>
                <option value="FMCG">FMCG &amp; Consumer Goods</option>
                <option value="Manufacturing">Manufacturing &amp; Engineering</option>
                <option value="Financial Services">Financial Services</option>
                <option value="Energy">Energy &amp; Utilities</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="form__group">
            <label class="form__label">Type of Inquiry <span class="required">*</span></label>
            <div class="form__radio-group">
              <label><input type="radio" name="inquiry_type" value="Export CH to India" required> Export from Switzerland to India</label>
              <label><input type="radio" name="inquiry_type" value="Import India to CH"> Import from India to Switzerland</label>
              <label><input type="radio" name="inquiry_type" value="TEPA Advisory"> TEPA Advisory &amp; Market Entry</label>
              <label><input type="radio" name="inquiry_type" value="Other"> Other</label>
            </div>
          </div>

          <div class="form__grid">
            <div class="form__group">
              <label class="form__label">Approximate Budget</label>
              <select name="budget" class="form__select">
                <option value="">Prefer not to say</option>
                <option value="Not yet defined">Not yet defined</option>
                <option value="<50k CHF">&lt; CHF 50,000</option>
                <option value="50-200k CHF">CHF 50,000 &ndash; 200,000</option>
                <option value=">200k CHF">&gt; CHF 200,000</option>
              </select>
            </div>
            <div class="form__group">
              <label class="form__label">Timeline</label>
              <select name="timeline" class="form__select">
                <option value="">Select timeline</option>
                <option value="Immediate">Immediate</option>
                <option value="1-3 months">1&ndash;3 months</option>
                <option value="3-6 months">3&ndash;6 months</option>
                <option value="Long-term">Long-term / Exploratory</option>
              </select>
            </div>
          </div>

          <div class="form__group">
            <label class="form__label">Your Message</label>
            <textarea name="message" class="form__textarea" placeholder="Tell us about your goals and how we can help..."></textarea>
          </div>

          <div class="form__group">
            <label class="form__checkbox">
              <input type="checkbox" required>
              I agree that my data will be processed to respond to my inquiry. See our <a href="privacy.html">Privacy Policy</a> for details.
            </label>
          </div>

          <button type="submit" class="btn btn--primary" style="width:100%;padding:16px;">Send Inquiry</button>
        </form>

        <!-- Contact Info Sidebar -->
        <div>
          <div style="background:var(--off-white);border-radius:16px;padding:32px;margin-bottom:24px;">
            <h4 style="margin-bottom:16px;">Direct Contact</h4>
            <p style="font-size:0.92rem;margin-bottom:12px;">
              <strong>Email</strong><br>
              <a href="mailto:info@pullely-consulting.com">info@pullely-consulting.com</a>
            </p>
            <p style="font-size:0.92rem;margin-bottom:12px;">
              <strong>Location</strong><br>
              Zurich, Switzerland
            </p>
            <p style="font-size:0.92rem;margin-bottom:0;">
              <strong>LinkedIn</strong><br>
              <a href="https://www.linkedin.com/in/sanoj-pullely" target="_blank" rel="noopener">Sanoj Pullely</a>
            </p>
          </div>

          <div style="background:var(--off-white);border-radius:16px;padding:32px;">
            <h4 style="margin-bottom:12px;">Prefer to talk?</h4>
            <p style="font-size:0.92rem;color:var(--medium-gray);">Book a free 30-minute consultation directly through our scheduling tool.</p>
            <a href="appointments.html" class="btn btn--outline-dark" style="margin-top:12px;padding:10px 24px;font-size:0.88rem;">Book a Call</a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer id="footer" class="footer"></footer>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
