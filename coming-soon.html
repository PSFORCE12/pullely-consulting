<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <title>Coming Soon | Pullely Consulting</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #0c131f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
    }
    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      margin-bottom: 48px;
      opacity: 0.9;
    }
    .logo span { color: #8ba5d2; }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
    }
    h1 span { color: #E8C87A; }
    p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.65);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .date-badge {
      display: inline-block;
      background: rgba(139,165,210,0.15);
      border: 1px solid rgba(139,165,210,0.35);
      border-radius: 100px;
      padding: 10px 28px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #8ba5d2;
      margin-bottom: 48px;
    }
    .btn {
      display: inline-block;
      background: #8ba5d2;
      color: #0c131f;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .btn:hover { background: #a0b9e2; }
    .footer-note {
      margin-top: 64px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="logo">PULLELY <span>CONSULTING</span></div>
  <h1>Launching <span>1 April 2026</span></h1>
  <p>We are putting the finishing touches on our new website. Come back on 1 April 2026 to discover how we connect Switzerland and India.</p>
  <div class="date-badge">&#128197;&nbsp; 1 April 2026</div>
  <br>
  <a href="appointments.html" class="btn">Book an Introductory Call</a>
  <div class="footer-note">&copy; 2026 Pullely Consulting &mdash; Zurich, Switzerland</div>
</body>
</html>
